<nav
  class="fixed w-full top-0 z-50 transition-all duration-200 border-b"
  [ngClass]="isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm border-concrete-200 py-2' : 'bg-white border-concrete-100 py-3'"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center cursor-pointer" routerLink="/">
        <span class="text-2xl font-extrabold tracking-tight text-steel-900" style="font-family: Sora, sans-serif;">
          Ferre<span class="text-ferre-600">Nexo</span>
        </span>
      </div>

      <!-- Center Nav -->
      <div class="hidden lg:flex flex-1 justify-center items-center mx-8 gap-1">
        <button
          (click)="filterByCategory('todos')"
          class="px-4 py-2 text-steel-600 hover:text-ferre-600 font-semibold text-sm rounded-lg hover:bg-ferre-50 transition-all"
        >
          Todos
        </button>

        <div class="relative" (mouseenter)="activeDropdown = 'categorias'" (mouseleave)="activeDropdown = null">
          <button class="px-4 py-2 flex items-center gap-1 text-steel-600 hover:text-ferre-600 font-semibold text-sm rounded-lg hover:bg-ferre-50 transition-all whitespace-nowrap">
            Categorías
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-200" [ngClass]="{'rotate-180': activeDropdown === 'categorias'}"><path d="m6 9 6 6 6-6"/></svg>
          </button>

          <div *ngIf="activeDropdown === 'categorias'" class="absolute left-0 top-full w-56 bg-white border border-concrete-200 shadow-lg rounded-xl py-1.5 z-50">
            <button *ngFor="let cat of categories" (click)="filterByCategory(cat.name); activeDropdown = null" class="w-full text-left px-4 py-2.5 text-sm text-steel-700 hover:bg-ferre-50 hover:text-ferre-600 transition-colors font-medium cursor-pointer">
              {{ cat.name }}
            </button>
            <div *ngIf="categories.length === 0" class="px-4 py-2.5 text-sm text-steel-400">
              No hay categorías cargadas.
            </div>
          </div>
        </div>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center gap-2">
        <!-- Search -->
        <div class="relative" data-search-container *ngIf="!isSearchExpanded">
          <button
            (click)="toggleSearchExpanded()"
            class="p-2 text-steel-500 hover:text-ferre-600 rounded-lg hover:bg-ferre-50 transition-all"
          >
            <lucide-icon [name]="Search" size="20"></lucide-icon>
          </button>
        </div>

        <!-- Search Expanded -->
        <div class="absolute left-0 right-0 top-full z-50 px-4 sm:px-6 lg:px-8" data-search-container *ngIf="isSearchExpanded">
          <div class="max-w-7xl mx-auto">
            <div class="bg-white rounded-xl shadow-lg border border-concrete-200 p-3 mt-2">
              <div class="flex items-center gap-2">
                <lucide-icon [name]="Search" size="18" class="text-ferre-500"></lucide-icon>
                <input
                  [(ngModel)]="searchQuery"
                  (input)="onSearchChange()"
                  type="text"
                  placeholder="Buscar productos..."
                  class="flex-1 outline-none bg-transparent text-steel-900 placeholder-steel-400 font-medium text-sm"
                />
                <button (click)="closeSearch()" class="text-steel-400 hover:text-steel-700 p-1">✕</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Cart -->
        <button
          (click)="openCart()"
          class="p-2 text-steel-500 hover:text-ferre-600 rounded-lg hover:bg-ferre-50 transition-all relative"
        >
          <lucide-icon [name]="ShoppingCart" size="20"></lucide-icon>
          <span
            *ngIf="cartCount > 0"
            class="absolute -top-0.5 -right-0.5 h-5 w-5 bg-ferre-600 rounded-full text-[10px] text-white flex items-center justify-center font-bold"
          >
            {{ cartCount }}
          </span>
        </button>

        <span class="w-px h-5 bg-concrete-200 hidden sm:block"></span>

        <!-- Admin -->
        <a
          routerLink="/auth/login"
          class="hidden sm:inline-flex items-center gap-2 text-sm font-semibold text-steel-600 hover:text-ferre-600 px-3 py-2 rounded-lg hover:bg-ferre-50 transition-all"
        >
          <lucide-icon [name]="User" size="18"></lucide-icon>
          Admin
        </a>
      </div>
    </div>
  </div>
</nav>
