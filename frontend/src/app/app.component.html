<app-header *ngIf="showLayout"></app-header>
<main>
  <router-outlet></router-outlet>
</main>
<app-cart-drawer *ngIf="showLayout"></app-cart-drawer>

<!-- WhatsApp floating button -->
<a
  *ngIf="showLayout"
  class="whatsapp-fab"
  [href]="whatsappHref"
  target="_blank"
  rel="noopener noreferrer"
  aria-label="Contactar por WhatsApp"
>
  <img 
  src="assets/whatsapp.png" 
  alt="WhatsApp" 
  class="w-12 h-12 object-contain hover:scale-110 transition-transform drop-shadow-[0_0_10px_rgba(37,211,102,0.5)]" 
/>
</a>
